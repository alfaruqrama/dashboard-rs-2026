# ══════════════════════════════════════════════════════════════
# FILE INI: .streamlit/secrets.toml
# JANGAN di-commit ke GitHub! (sudah ada di .gitignore)
# ══════════════════════════════════════════════════════════════

# Ambil dari URL Google Sheets:
# https://docs.google.com/spreadsheets/d/<<INI_SPREADSHEET_ID>>/edit
spreadsheet_id = "GANTI_DENGAN_SPREADSHEET_ID"

# Isi dari file JSON Service Account (download dari Google Cloud Console)
[gcp_service_account]
type = "service_account"
project_id = "nama-project"
private_key_id = "key-id"
private_key = "-----BEGIN RSA PRIVATE KEY-----\nPRIVATE_KEY_DI_SINI\n-----END RSA PRIVATE KEY-----\n"
client_email = "service-account@project.iam.gserviceaccount.com"
client_id = "000000000000"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "https://www.googleapis.com/robot/v1/metadata/x509/service-account%40project.iam.gserviceaccount.com"
